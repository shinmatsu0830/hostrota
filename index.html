<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HostRota Prototype v0.6</title>
<style>
:root{--bg:#0f1115;--card:#171a21;--card2:#1f2430;--text:#f5f7fb;--muted:#9aa3b2;--border:#2a3040}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:820px;margin:0 auto;padding:18px}h1{font-size:28px;margin:4px 0 2px}.sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{justify-content:space-between}
input,select,button,textarea{font:inherit;border-radius:10px;border:1px solid var(--border)}
input,select,textarea{background:var(--card2);color:var(--text);padding:10px 12px}button{background:#fff;color:#111;padding:10px 14px;font-weight:700;cursor:pointer}
button.secondary{background:var(--card2);color:var(--text)}.plan-group{display:flex;gap:8px;margin-top:8px}
.plan-btn{flex:1;background:var(--card2);color:var(--text)}.plan-btn.active{background:#fff;color:#111;border-color:#fff}
.cast-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
.cast{padding:10px;background:var(--card2);border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:999px}.waiting{background:#34c759}.first{background:#ffcc00}.shimei{background:#ff3b30}.champagne{background:#af52de}.break{background:#8e8e93}
.small{font-size:12px;color:var(--muted)}.section-title{font-size:18px;font-weight:800}.field-block{margin-top:12px}label{font-size:13px;color:var(--muted)}
.photo-box{margin-top:14px;padding:12px;background:var(--card2);border-radius:12px;border:1px solid var(--border)}
.guest-card{padding:12px 0;border-bottom:1px solid var(--border)}.guest-card:last-child{border-bottom:none}
.photo-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}.photo-grid select{width:100%}
.schedule-wrap{overflow-x:auto;margin-top:14px}.schedule{width:100%;border-collapse:collapse;min-width:560px}
.schedule th,.schedule td{border-bottom:1px solid var(--border);padding:8px 5px;text-align:left}.schedule select{width:100%}
.time-cell{white-space:nowrap}.copybox{width:100%;min-height:240px;margin-top:10px;resize:vertical}
.badge{display:inline-block;padding:3px 7px;border-radius:999px;background:var(--card2);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="app">
<h1>HostRota</h1>
<div class="sub">ホストクラブ付け回し管理 プロトタイプ Ver.0.8</div>

<div class="card">
  <div class="row between"><div class="section-title">キャスト状況</div><button class="secondary" onclick="resetStatuses()">全員待機</button></div>
  <div class="small">16人登録済み。タップすると状態を変更できます。</div>
  <div id="castGrid" class="cast-grid"></div>
</div>

<div class="card">
  <div class="section-title">付け回し自動作成</div>

  <div class="field-block">
    <label>プラン</label>
    <div class="plan-group">
      <button class="plan-btn" data-plan="Aプラン" onclick="selectPlan('Aプラン')">Aプラン</button>
      <button class="plan-btn active" data-plan="Bプラン" onclick="selectPlan('Bプラン')">Bプラン</button>
      <button class="plan-btn" data-plan="Cプラン" onclick="selectPlan('Cプラン')">Cプラン</button>
    </div>
  </div>

  <div class="row" style="margin-top:14px">
    <label>見出し <input id="room" value="A3"></label>
    <label>開始 <input id="start" type="time" value="20:55"></label>
    <label>間隔(分) <input id="interval" type="number" value="5" min="1"></label>
    <label>初回人数 <input id="guestCount" type="number" value="1" min="1" max="8"></label>
    <label>付け回し回数 <input id="roundCount" type="number" value="8" min="1" max="16"></label>
  </div>

  <div id="photoSection" class="photo-box">
    <div class="row between">
      <strong>Bプラン 写真指名</strong>
      <span class="badge">各初回 最大5名</span>
    </div>
    <div class="small">初回が2人組の場合は「右」「左」それぞれ最大5名まで写真指名を選べます。写真指名キャストは該当する側へ優先配置し、それ以外のキャストは現場で右左を決められます。</div>
    <div id="photoGuests"></div>
  </div>

  <div style="margin-top:14px">
    <button onclick="autoGenerate()">付け回しを自動作成</button>
  </div>

  <div class="schedule-wrap">
    <table class="schedule">
      <thead id="scheduleHead"><tr><th>時間</th><th>キャスト</th></tr></thead>
      <tbody id="scheduleBody"></tbody>
    </table>
  </div>
</div>

<div class="card">
  <div class="row between"><div class="section-title">LINE用テキスト</div><button onclick="copyLineText()">コピー</button></div>
  <textarea id="lineText" class="copybox"></textarea>
</div>
</div>

<script>
const names=["れいや","爽","一護","葉月","アヤト","七翔","なぎさ","湊","ゆうすけ","りゅう","つかさ","あきら","なち","ソラ","長門","せーや"];
const statusList=[
 {label:"待機",cls:"waiting"},
 {label:"初回中",cls:"first"},
 {label:"指名中",cls:"shimei"},
 {label:"シャンパン",cls:"champagne"},
 {label:"休憩",cls:"break"}
];
let selectedPlan="Bプラン";
let castStatus=Array(names.length).fill(0);
let assignments=[];

function renderCasts(){
 const grid=document.getElementById("castGrid"); grid.innerHTML="";
 names.forEach((n,i)=>{
  const s=statusList[castStatus[i]];
  const el=document.createElement("div"); el.className="cast";
  el.innerHTML=`<span class="dot ${s.cls}"></span><div><strong>${n}</strong><div class="small">${s.label}</div></div>`;
  el.onclick=()=>{castStatus[i]=(castStatus[i]+1)%statusList.length;renderCasts();};
  grid.appendChild(el);
 });
}
function resetStatuses(){castStatus.fill(0);renderCasts();}
function selectPlan(plan){
 selectedPlan=plan;
 document.querySelectorAll(".plan-btn").forEach(b=>b.classList.toggle("active",b.dataset.plan===plan));
 document.getElementById("photoSection").style.display=plan==="Bプラン"?"block":"none";
 renderPhotoSelectors();
 updateLineText();
}
function castOptions(blank=true){
 return (blank?'<option value="">未選択</option>':'')+names.map(n=>`<option value="${n}">${n}</option>`).join("");
}
function guestLabel(g,count){
 if(count===2) return g===1 ? "右" : "左";
 return `初回${g}`;
}
function renderPhotoSelectors(){
 const wrap=document.getElementById("photoGuests");
 const count=Math.max(1,Number(document.getElementById("guestCount").value||1));
 wrap.innerHTML="";
 for(let g=1;g<=count;g++){
  const label=guestLabel(g,count);
  const div=document.createElement("div");div.className="guest-card";
  div.innerHTML=`<strong>${label}のお客さん</strong><div class="small">写真指名 最大5名</div><div class="photo-grid">
   ${[1,2,3,4,5].map(i=>`<select class="photoSelect" data-guest="${g}" data-slot="${i}">${castOptions(true)}</select>`).join("")}
  </div>`;
  wrap.appendChild(div);
 }
}
function addMinutes(t,mins){
 const [h,m]=t.split(":").map(Number);let total=(h*60+m+mins)%1440;
 return String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0");
}
function photoPicksForGuest(g){
 return [...document.querySelectorAll(`.photoSelect[data-guest="${g}"]`)]
   .map(s=>s.value).filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);
}
function priorityCastNames(){
 const waiting=names.filter((_,i)=>castStatus[i]===0);
 const others=names.filter((_,i)=>castStatus[i]!==0);
 return [...waiting,...others];
}
function chooseCastForGuest(g, usedByGuest, usedThisTime, photoPicks){
 const candidates=[...photoPicks,...priorityCastNames()];
 for(const n of candidates){
   if(!usedByGuest.has(n) && !usedThisTime.has(n)) return n;
 }
 for(const n of candidates){
   if(!usedByGuest.has(n)) return n;
 }
 return "";
}
function autoGenerate(){
 const guestCount=Math.max(1,Number(document.getElementById("guestCount").value||1));
 const roundCount=Math.max(1,Number(document.getElementById("roundCount").value||8));
 const start=document.getElementById("start").value||"20:55";
 const interval=Math.max(1,Number(document.getElementById("interval").value||5));

 assignments=[];
 const usedPerGuest=Array.from({length:guestCount},()=>new Set());
 const photoPerGuest=Array.from({length:guestCount},(_,i)=>selectedPlan==="Bプラン"?photoPicksForGuest(i+1):[]);
 const priority=priorityCastNames();

 for(let r=0;r<roundCount;r++){
   const time=addMinutes(start,interval*r);

   if(guestCount===2){
     const rightPhotos=photoPerGuest[0];
     const leftPhotos=photoPerGuest[1];

     let right="";
     let left="";

     // 写真指名を各側に優先配置。同じキャストを同時刻に重複させない。
     for(const n of [...rightPhotos,...priority]){
       if(!usedPerGuest[0].has(n)){
         right=n; break;
       }
     }
     if(right) usedPerGuest[0].add(right);

     for(const n of [...leftPhotos,...priority]){
       if(n!==right && !usedPerGuest[1].has(n)){
         left=n; break;
       }
     }
     if(left) usedPerGuest[1].add(left);

     assignments.push({time, guest:1, cast:right, side:"right"});
     assignments.push({time, guest:2, cast:left, side:"left"});
   } else {
     const usedThisTime=new Set();
     for(let g=0;g<guestCount;g++){
       const cast=chooseCastForGuest(g+1,usedPerGuest[g],usedThisTime,photoPerGuest[g]);
       if(cast){usedPerGuest[g].add(cast);usedThisTime.add(cast);}
       assignments.push({time,guest:g+1,cast});
     }
   }
 }
 renderSchedule();
 updateLineText();
}

function renderSchedule(){
 const body=document.getElementById("scheduleBody");body.innerHTML="";
 const head=document.getElementById("scheduleHead");
 const guestCount=Math.max(1,Number(document.getElementById("guestCount").value||1));

 if(guestCount===2){
   head.innerHTML="<tr><th>時間</th><th>右</th><th>左</th></tr>";
   const grouped={};
   assignments.forEach((a,idx)=>{
     if(!grouped[a.time]) grouped[a.time]={time:a.time,right:null,left:null,rightIdx:null,leftIdx:null};
     if(a.side==="right"){grouped[a.time].right=a.cast;grouped[a.time].rightIdx=idx;}
     else if(a.side==="left"){grouped[a.time].left=a.cast;grouped[a.time].leftIdx=idx;}
   });

   Object.values(grouped).forEach(row=>{
     const tr=document.createElement("tr");
     tr.innerHTML=`
       <td class="time-cell">${row.time}</td>
       <td><select class="manualCast" data-index="${row.rightIdx}">
         ${names.map(n=>`<option ${n===row.right?"selected":""}>${n}</option>`).join("")}
       </select></td>
       <td><select class="manualCast" data-index="${row.leftIdx}">
         ${names.map(n=>`<option ${n===row.left?"selected":""}>${n}</option>`).join("")}
       </select></td>`;
     body.appendChild(tr);
   });
 } else {
   head.innerHTML="<tr><th>時間</th><th>初回</th><th>キャスト</th></tr>";
   assignments.forEach((a,idx)=>{
     const label=guestLabel(a.guest,guestCount);
     const tr=document.createElement("tr");
     tr.innerHTML=`<td class="time-cell">${a.time}</td><td>${label}</td>
     <td><select class="manualCast" data-index="${idx}">${names.map(n=>`<option ${n===a.cast?"selected":""}>${n}</option>`).join("")}</select></td>`;
     body.appendChild(tr);
   });
 }

 document.querySelectorAll(".manualCast").forEach(sel=>{
   sel.onchange=()=>{assignments[Number(sel.dataset.index)].cast=sel.value;updateLineText();};
 });
}

function getPhotoSummary(){
 if(selectedPlan!=="Bプラン") return [];
 const guestCount=Math.max(1,Number(document.getElementById("guestCount").value||1));
 const lines=[];

 if(guestCount===2){
   const right=photoPicksForGuest(1);
   const left=photoPicksForGuest(2);
   if(right.length||left.length){
     lines.push("【写真指名】");
     lines.push(`右：${right.length ? right.join("・") : "なし"}`);
     lines.push(`左：${left.length ? left.join("・") : "なし"}`);
     lines.push("");
   }
 } else {
   for(let g=1;g<=guestCount;g++){
     const picks=photoPicksForGuest(g);
     if(picks.length) lines.push(`初回${g}：${picks.join("・")}`);
   }
   if(lines.length) lines.unshift("【写真指名】");
   if(lines.length) lines.push("");
 }
 return lines;
}

function updateLineText(){
 const room=document.getElementById("room").value.trim();
 const guestCount=Math.max(1,Number(document.getElementById("guestCount").value||1));
 let lines=["@All","",room,"",selectedPlan,""];

 lines.push(...getPhotoSummary());

 const grouped={};
 assignments.forEach(a=>{
   if(!grouped[a.time]) grouped[a.time]=[];
   grouped[a.time].push(a);
 });

 Object.keys(grouped).forEach(time=>{
   const arr=grouped[time];

   if(guestCount===2){
     // LINEでは右左を付けず、同時刻の2名だけ表示
     const casts=arr.map(a=>a.cast).filter(Boolean);
     lines.push(`${time}${casts.join("　")}`);
   } else if(arr.length===1){
     lines.push(`${time}${arr[0].cast}`);
   } else {
     lines.push(`${time} ${arr.map(a=>a.cast).join("　")}`);
   }
 });

 document.getElementById("lineText").value=lines.join("
");
}

async function copyLineText(){
 updateLineText();const box=document.getElementById("lineText");
 try{await navigator.clipboard.writeText(box.value);alert("コピーしました");}
 catch(e){box.select();document.execCommand("copy");alert("コピーしました");}
}
document.getElementById("guestCount").addEventListener("input",()=>{renderPhotoSelectors();autoGenerate();});
document.getElementById("photoGuests").addEventListener("change",updateLineText);
document.getElementById("room").addEventListener("input",updateLineText);
renderCasts();renderPhotoSelectors();autoGenerate();
</script>
</body>
</html>
